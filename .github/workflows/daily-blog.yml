name: 📝 Daily blog post (GPT) — AllGrafika.pl

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # codziennie 06:00 UTC

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate blog post, update registry and create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import os, json, requests, re, sys, subprocess, time
          from datetime import datetime
          from pathlib import Path

          def run(cmd):
              result = subprocess.run(
                  cmd, shell=isinstance(cmd, str),
                  check=True, capture_output=True, text=True
              )
              if result.stdout:
                  print(result.stdout)
              return result.stdout.strip()

          # ── Gather existing articles ────────────────────────────────────────
          articles_dir = Path("landing-page/src/data/blogPosts")
          existing = []
          for ts_file in sorted(articles_dir.glob("*.ts")):
              text = ts_file.read_text(encoding="utf-8")
              title_m = re.search(r"title:\s*'([^']+)'", text)
              if not title_m:
                  title_m = re.search(r'title:\s*"([^"]+)"', text)
              slug_m = re.search(r"slug:\s*'([^']+)'", text)
              if not slug_m:
                  slug_m = re.search(r'slug:\s*"([^"]+)"', text)
              cat_m = re.search(r"category:\s*'([^']+)'", text)
              if not cat_m:
                  cat_m = re.search(r'category:\s*"([^"]+)"', text)
              if title_m:
                  existing.append({
                      "title": title_m.group(1),
                      "slug": slug_m.group(1) if slug_m else "",
                      "category": cat_m.group(1) if cat_m else "",
                  })

          existing_count = len(existing)
          next_id = str(existing_count + 1)

          now = datetime.now()
          date_iso = now.strftime("%Y-%m-%d")
          existing_str = "\n".join(f"- {e['title']} (slug: {e['slug']}, kat: {e['category']})" for e in existing)

          # Count topics per category to identify underrepresented areas
          cat_counts = {}
          for e in existing:
              c = e['category']
              cat_counts[c] = cat_counts.get(c, 0) + 1
          cat_summary = ", ".join(f"{k}: {v}" for k, v in sorted(cat_counts.items(), key=lambda x: x[1]))

          # ── Prompts ─────────────────────────────────────────────────────────
          SYSTEM_PROMPT = (
              "Jesteś doświadczonym copywriterem SEO i strategiem contentu dla AllGrafika.pl "
              "— polskiego narzędzia AI do automatycznego generowania profesjonalnych miniaturek "
              "i zdjęć produktowych dla sprzedawców na Allegro.\n\n"
              "CZYM JEST ALLGRAFIKA.PL:\n"
              "Aplikacja webowa, która:\n"
              "- Przyjmuje zdjęcie produktu (JPG, PNG, WebP) od sprzedawcy\n"
              "- Automatycznie generuje 6 wariantów profesjonalnych miniaturek w różnych stylach\n"
              "- Używa dedykowanego AI do analizy produktu i tworzenia optymalnych opisów\n"
              "- Umożliwia własny prompt z opcjonalnym zdjęciem referencyjnym\n"
              "- Przechowuje wygenerowane grafiki bezpiecznie w chmurze\n"
              "- Kosztuje ok. 1-2 zł za grafikę, pierwsze 10 miniaturek jest bezpłatnych\n"
              "- Oszczędza czas i pieniądze vs. tradycyjna sesja fotograficzna (200-500 zł za produkt)\n\n"
              "DOSTĘPNE STYLE MINIATUREK (wplataj naturalnie — max 2-3 wzmianki na artykuł):\n"
              "- Białe tło (White Background) — wymagane przez Allegro, profesjonalne\n"
              "- Lifestyle — produkt w naturalnym otoczeniu użytkowania\n"
              "- Dark luxury — ciemne tło z dramatycznym oświetleniem (biżuteria, zegarki, perfumy)\n"
              "- Minimalistyczny — dużo pustej przestrzeni, czyste linie\n"
              "- Flat lay — widok z góry z komplementarnymi elementami\n"
              "- Studio — neutralne tło gradientowe, miękkie naturalne cienie\n\n"
              "ZASADY PISANIA ARTYKUŁÓW:\n"
              "1. Język: profesjonalny, ale przystępny polski. Bez korporacyjnego żargonu.\n"
              "2. Styl: bezpośredni — zwracaj się do czytelnika 'Ty', 'Twoje produkty', 'Twój sklep'.\n"
              "3. UNIKALNA STRUKTURA: każdy artykuł musi mieć inną strukturę H2/H3 niż pozostałe.\n"
              "   Nie używaj standardowego schematu 'wstęp → lista → podsumowanie'.\n"
              "   Stosuj: studium przypadku, porównanie opcji, checklist, Q&A, krok po kroku, dane/statystyki.\n"
              "4. UNIKALNY WSTĘP: zacznij od zaskakującego faktu, pytania retorycznego, anegdoty lub\n"
              "   konkretnej liczby/statystyki — nigdy od 'W dzisiejszych czasach' ani ogólnika.\n"
              "5. SEO On-Page: główna fraza kluczowa w tytule, excercie i pierwszym H2.\n"
              "   Frazy LSI rozsiane naturalnie w treści. NIE powtarzaj frazy kluczowej mechanicznie.\n"
              "6. Długość: 600-800 słów treści (pole 'content') — więcej niż dotychczas.\n"
              "7. FORMAT pola 'content' — WYŁĄCZNIE liniowy Markdown bez HTML:\n"
              "   - Nagłówek H2: linia zaczynająca się od '## ' (dwa hashe i spacja)\n"
              "   - Nagłówek H3: linia zaczynająca się od '### ' (trzy hashe i spacja)\n"
              "   - Element listy: linia zaczynająca się od '- ' (myślnik i spacja)\n"
              "   - Pogrubienie: **tekst** (dwie gwiazdki z każdej strony)\n"
              "   - Link: [tekst](url) (nawias kwadratowy z tekstem i okrągły z URL)\n"
              "   - Akapit: zwykła linia tekstu\n"
              "   - Odstęp między sekcjami: pusta linia\n"
              "   - BEZ tagów HTML, BEZ numerowanych list (zamiast 1. 2. 3. używaj - )\n"
              "8. Ostatni akapit artykułu: link do strony głównej — dokładnie ta linia:\n"
              "   '[← Przejdź do AllGrafika.pl](https://allgrafika.pl/)'\n"
              "9. Każde INNE wystąpienie nazwy AllGrafika w treści artykułu zapisuj jako "
              "link: [AllGrafika.pl](https://app.allgrafika.pl/register)\n"
              "10. INTERNAL LINKS: w treści artykułu dodaj 1-2 linki do innych powiązanych artykułów "
              "na blogu allgrafika.pl używając formatu [tytuł artykułu](https://allgrafika.pl/blog/slug).\n"
              "11. slug: tylko małe litery ASCII (a-z), myślniki zamiast spacji, "
              "bez polskich znaków diakrytycznych, max 60 znaków, "
              "ZAWSZE zaczyna się od litery (nie cyfry).\n"
              "12. category: jedna z: Poradniki / Technologia / Styl i design / E-commerce / Optymalizacja.\n"
              "    Priorytetuj kategorie z mniejszą liczbą artykułów.\n"
              "13. readTime: liczba całkowita (szacowane minuty czytania, ok. 200 słów/min).\n"
              "14. NIGDY nie powtarzaj tematów z listy istniejących artykułów.\n"
              "15. RÓŻNORODNOŚĆ STRUKTURY H2: używaj od 3 do 5 sekcji H2, każda z innym typem treści\n"
              "    (np. jedna sekcja z listą, jedna z akapitami narracyjnymi, jedna z H3 i podpunktami)."
          )

          USER_PROMPT = (
              f"Data publikacji: {date_iso}\n\n"
              f"Liczba artykułów per kategoria: {cat_summary}\n\n"
              f"Istniejące artykuły na blogu (NIE powtarzaj tych tematów):\n"
              f"{existing_str}\n\n"
              "Napisz nowy artykuł SEO dla AllGrafika.pl.\n\n"
              "WAŻNE — priorytetuj tematy, których jeszcze NIE ma na blogu:\n"
              "- jak napisać skuteczny tytuł aukcji Allegro wspierający miniaturkę\n"
              "- porównanie formatów grafik: JPG vs WebP vs PNG na Allegro — co wybrać\n"
              "- jak dostosować miniaturki do sezonowych kampanii (Boże Narodzenie, lato, Wielkanoc)\n"
              "- optymalizacja konwersji listingu Allegro — grafika + tytuł + cena\n"
              "- jak testować efektywność miniaturek bez dużego budżetu reklamowego\n"
              "- wpływ tła miniaturki na postrzeganą wartość produktu przez kupującego\n"
              "- miniaturki dla nowych kategorii na Allegro (np. żywność, zwierzęta, narzędzia)\n"
              "- automatyzacja workflow graficznego dla sklepów z 500+ SKU\n"
              "- case study: jak zmiana miniaturki zwiększyła CTR o X%\n"
              "- porównanie platform e-commerce pod kątem wymagań graficznych (Allegro vs Shopify vs WooCommerce)\n"
              "- rola miniaturki w algorytmie rankingowym Allegro 2025/2026\n"
              "- miniaturki na urządzenia mobilne — jak wyglądają Twoje grafiki na telefonie\n"
              "- jak tworzyć grafiki świąteczne i promocyjne do ofert na Allegro\n"
              "- psychologia cen a styl miniaturki — jak premium packaging wpływa na postrzeganą cenę\n"
              "— lub inny unikalny temat związany z miniaturkami, grafiką produktową, sprzedażą online.\n\n"
              "Wymagania dotyczące STRUKTURY tego konkretnego artykułu:\n"
              "- Zacznij od ZASKAKUJĄCEGO FAKTU lub KONKRETNEJ LICZBY (nie od ogólnika)\n"
              "- Użyj CO NAJMNIEJ jednej sekcji H2 z typem 'studium przypadku' lub 'konkretny przykład'\n"
              "- Użyj CO NAJMNIEJ jednej sekcji z podpunktami H3\n"
              "- Zakończ konkretnym CTA lub action item dla czytelnika\n\n"
              "Zwróć WYŁĄCZNIE surowy obiekt JSON (zero markdown, zero ```, zero komentarzy przed/po), "
              "w DOKŁADNIE tym formacie:\n"
              "{\n"
              '  "slug": "slug-bez-polskich-znakow-zaczyna-sie-od-litery-max-60-znakow",\n'
              '  "title": "Tytuł SEO 60-70 znaków z główną frazą kluczową",\n'
              '  "excerpt": "Opis 150-180 znaków z główną frazą SEO. Zachęca do przeczytania artykułu.",\n'
              '  "category": "jedna z: Poradniki / Technologia / Styl i design / E-commerce / Optymalizacja",\n'
              '  "readTime": 6,\n'
              '  "content": "## Nagłówek sekcji\\n\\nTekst akapitu z **pogrubieniem**.\\n\\n## Kolejna sekcja..."\n'
              "}"
          )

          # ── Call GitHub Models API ──────────────────────────────────────────
          token = os.environ.get("GH_TOKEN") or os.environ.get("GITHUB_TOKEN")
          if not token:
              print("ERROR: GH_TOKEN not set"); sys.exit(1)

          resp = requests.post(
              "https://models.inference.ai.azure.com/chat/completions",
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              json={
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": SYSTEM_PROMPT},
                      {"role": "user",   "content": USER_PROMPT},
                  ],
                  "max_tokens": 3500,
                  "temperature": 0.85,
                  "response_format": {"type": "json_object"},
              },
              timeout=180,
          )
          print(f"API status: {resp.status_code}")
          if resp.status_code != 200:
              print(resp.text); sys.exit(1)

          raw = resp.json()["choices"][0]["message"]["content"].strip()
          raw = re.sub(r"^```\w*\n?", "", raw)
          raw = re.sub(r"\n?```$",    "", raw)

          try:
              article = json.loads(raw.strip())
          except json.JSONDecodeError as e:
              print(f"JSON parse error: {e}\nRaw: {raw[:500]}"); sys.exit(1)

          slug = article["slug"]

          # ── Duplicate guard ─────────────────────────────────────────────────
          if (articles_dir / f"{slug}.ts").exists():
              print(f"⚠️  Post '{slug}' already exists — skipping to avoid duplicate.")
              sys.exit(0)

          index_path = Path("landing-page/src/data/blogPosts.ts")
          idx = index_path.read_text(encoding="utf-8")
          if f"from './blogPosts/{slug}'" in idx:
              print(f"⚠️  Slug '{slug}' already registered in blogPosts.ts — skipping.")
              sys.exit(0)

          # ── Write TS article file ───────────────────────────────────────────
          def esc_sq(s):
              """Escape for TypeScript single-quoted string."""
              return str(s).replace("\\", "\\\\").replace("'", "\\'")

          def esc_tl(s):
              """Escape for TypeScript template literal (backtick string)."""
              return str(s).replace("\\", "\\\\").replace("`", "\\`").replace("${", "\\${")

          ts_content = (
              "import type { BlogPostData } from '../blogPosts'\n\n"
              "const post: BlogPostData = {\n"
              f"  id: '{esc_sq(next_id)}',\n"
              f"  slug: '{esc_sq(slug)}',\n"
              f"  title: '{esc_sq(article['title'])}',\n"
              f"  excerpt: '{esc_sq(article['excerpt'])}',\n"
              "  content: `\n"
              f"{esc_tl(article['content'])}\n"
              "  `,\n"
              f"  publishedAt: '{date_iso}',\n"
              f"  modifiedAt: '{date_iso}',\n"
              f"  author: 'AllGrafika.pl',\n"
              f"  readTime: {int(article['readTime'])},\n"
              f"  category: '{esc_sq(article['category'])}',\n"
              "}\n\n"
              "export default post\n"
          )

          out_file = articles_dir / f"{slug}.ts"
          out_file.write_text(ts_content, encoding="utf-8")
          print(f"Saved: {out_file}")

          # ── Update blogPosts.ts registry ────────────────────────────────────
          # Build camelCase variable name from slug
          parts    = slug.split("-")
          var_name = parts[0] + "".join(p.capitalize() for p in parts[1:])
          # JS identifiers cannot start with a digit
          if var_name and var_name[0].isdigit():
              var_name = "post" + var_name[0].upper() + var_name[1:]

          new_import = f"import {var_name} from './blogPosts/{slug}'"

          # Insert new import right before the blank line + "export interface"
          idx = re.sub(
              r"(import \w+ from '\./blogPosts/[^']+'\n)(\nexport interface)",
              lambda m: m.group(1) + new_import + "\n" + m.group(2),
              idx,
              count=1,
          )

          # Append new variable to named export { ... }
          idx = re.sub(
              r"(export \{)([^}]+)(\})",
              lambda m: m.group(1) + m.group(2).rstrip() + f", {var_name} " + m.group(3),
              idx,
              count=1,
          )

          # Insert as first element of blogPosts array (newest first)
          idx = re.sub(
              r"(export const blogPosts: BlogPostData\[\] = \[)",
              lambda m: m.group(1) + f"{var_name}, ",
              idx,
              count=1,
          )

          index_path.write_text(idx, encoding="utf-8")
          print(f"blogPosts.ts updated — added: {var_name}")

          # ── Regenerate public/sitemap.xml with correct dates ────────────────
          sitemap_entries = []

          # Collect all posts with their publishedAt dates
          all_posts_meta = []
          for ts_file in sorted(articles_dir.glob("*.ts")):
              text = ts_file.read_text(encoding="utf-8")
              slug_m = re.search(r"slug:\s*'([^']+)'", text) or re.search(r'slug:\s*"([^"]+)"', text)
              pub_m  = re.search(r"publishedAt:\s*'([^']+)'", text) or re.search(r'publishedAt:\s*"([^"]+)"', text)
              mod_m  = re.search(r"modifiedAt:\s*'([^']+)'", text) or re.search(r'modifiedAt:\s*"([^"]+)"', text)
              if slug_m:
                  post_slug    = slug_m.group(1)
                  published_at = pub_m.group(1)  if pub_m  else date_iso
                  modified_at  = mod_m.group(1)  if mod_m  else published_at
                  lastmod      = modified_at if modified_at else published_at
                  all_posts_meta.append({"slug": post_slug, "lastmod": lastmod})

          most_recent = max((p["lastmod"] for p in all_posts_meta), default=date_iso)

          def sitemap_url(loc, lastmod, changefreq, priority):
              return (
                  f"  <url>\n"
                  f"    <loc>{loc}</loc>\n"
                  f"    <lastmod>{lastmod}</lastmod>\n"
                  f"    <changefreq>{changefreq}</changefreq>\n"
                  f"    <priority>{priority}</priority>\n"
                  f"  </url>"
              )

          sitemap_entries.append(sitemap_url("https://allgrafika.pl/",                      most_recent,   "weekly",  "1.0"))
          sitemap_entries.append(sitemap_url("https://allgrafika.pl/blog",                  most_recent,   "weekly",  "0.9"))
          sitemap_entries.append(sitemap_url("https://allgrafika.pl/regulamin",             "2026-01-01", "yearly",  "0.3"))
          sitemap_entries.append(sitemap_url("https://allgrafika.pl/polityka-prywatnosci",  "2026-01-01", "yearly",  "0.3"))

          for p in sorted(all_posts_meta, key=lambda x: x["lastmod"], reverse=True):
              sitemap_entries.append(sitemap_url(
                  f"https://allgrafika.pl/blog/{p['slug']}",
                  p["lastmod"], "monthly", "0.7"
              ))

          sitemap_xml = (
              '<?xml version="1.0" encoding="UTF-8"?>\n'
              '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
              + "\n".join(sitemap_entries) + "\n"
              '</urlset>\n'
          )

          sitemap_path = Path("landing-page/public/sitemap.xml")
          sitemap_path.write_text(sitemap_xml, encoding="utf-8")
          print(f"✅ sitemap.xml updated ({len(all_posts_meta)} blog posts)")

          # ── Git & PR ────────────────────────────────────────────────────────
          commit_msg = f"feat(blog): {article['title']} ({date_iso})"

          run("git config user.name 'github-actions[bot]'")
          run("git config user.email 'github-actions[bot]@users.noreply.github.com'")
          run("git add landing-page/src/data/ landing-page/public/sitemap.xml")
          run(["git", "commit", "-m", commit_msg])
          run(["git", "push", "origin", "HEAD:main"])
          print(f"✅ Pushed to main: {commit_msg}")
          PYEOF

