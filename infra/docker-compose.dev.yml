version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: miniaturyallegro_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: miniaturyallegro
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: builder
    container_name: miniaturyallegro_backend_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/miniaturyallegro?schema=public
      JWT_SECRET: dev-secret-key-not-for-production
      JWT_EXPIRES_IN: 7d
      B2_ENDPOINT: ${B2_ENDPOINT:-}
      B2_BUCKET_NAME: ${B2_BUCKET_NAME:-}
      B2_KEY_ID: ${B2_KEY_ID:-}
      B2_APPLICATION_KEY: ${B2_APPLICATION_KEY:-}
      B2_REGION: us-west-004
      B2_PUBLIC_URL: ${B2_PUBLIC_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ../backend/src:/app/src
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate dev --name init && npm run start:dev"

volumes:
  postgres_dev_data:
