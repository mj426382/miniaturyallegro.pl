version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: AllGrafika_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: AllGrafika
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: builder
    container_name: AllGrafika_backend_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/AllGrafika?schema=public
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ../backend/src:/app/src
      - backend_uploads:/app/uploads
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && npm run start:dev"

volumes:
  postgres_dev_data:
  backend_uploads:
